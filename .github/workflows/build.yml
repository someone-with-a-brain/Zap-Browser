name: ⚡ ZAP Browser — Build

on:
  push:
    branches: [ main, master, dev ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed to create GitHub Releases

# ── Build Matrix ──────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build (${{ matrix.os-label }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner:    windows-latest
            os-label:  Windows x64
            preset:    windows-release
            artifact:  zap-windows-x64

    # ── Environment ───────────────────────────────────────────────────────────
    env:
      QT_VERSION:  "6.7.2"
      BUILD_TYPE:  Release

    steps:
    # ── 1. Checkout ───────────────────────────────────────────────────────────
    - name: 📥 Checkout source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # full history for version tagging

    # ── 2. Resolve latest CEF build from Spotify index ────────────────────────
    #    Queries the official CEF build index to get the real filename for the
    #    latest stable Windows 64-bit standard distribution.
    #    Saves: cef-filename, cef-url, cef-version as step outputs.
    - name: 🔍 Resolve latest CEF version
      id: cef-info
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $ProgressPreference    = "SilentlyContinue"

        $indexUrl = "https://cef-builds.spotifycdn.com/index.json"
        Write-Host "Fetching CEF index from: $indexUrl"

        $index = Invoke-RestMethod -Uri $indexUrl -TimeoutSec 30

        # Find the latest stable Windows 64-bit standard distribution
        $builds = $index.'windows64'.versions `
          | Where-Object { $_.channel -eq "stable" } `
          | Select-Object -First 1

        if (-not $builds) {
          throw "No stable Windows 64-bit CEF builds found in index."
        }

        $file = $builds.files | Where-Object { $_.type -eq "standard" } | Select-Object -First 1
        if (-not $file) {
          throw "No standard distribution file found for this build."
        }

        $filename = $file.name
        $encoded  = [uri]::EscapeDataString($filename)
        $url      = "https://cef-builds.spotifycdn.com/$encoded"
        $version  = $builds.cef_version

        Write-Host "CEF version  : $version"
        Write-Host "CEF filename : $filename"
        Write-Host "CEF URL      : $url"

        # Export as step outputs
        "cef-filename=$filename" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "cef-url=$url"           | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "cef-version=$version"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    # ── 3. Cache CEF (keyed on the real resolved filename) ────────────────────
    - name: 💾 Cache CEF SDK
      id: cache-cef
      uses: actions/cache@v4
      with:
        path: third_party/cef
        key: cef-${{ steps.cef-info.outputs.cef-filename }}

    # ── 4. Download & extract CEF (if not cached) ─────────────────────────────
    - name: ⬇️  Download & extract CEF
      if: steps.cache-cef.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $ProgressPreference    = "SilentlyContinue"

        $filename = "${{ steps.cef-info.outputs.cef-filename }}"
        $url      = "${{ steps.cef-info.outputs.cef-url }}"

        Write-Host "Downloading: $filename"
        Write-Host "From       : $url"

        Invoke-WebRequest -Uri $url -OutFile "cef.tar.bz2" -TimeoutSec 600

        Write-Host "Extracting (bz2 → tar → folder)..."
        New-Item -ItemType Directory -Force -Path "third_party" | Out-Null

        # 7z is pre-installed on GitHub Windows runners
        & 7z x "cef.tar.bz2" -o"."          -y | Out-Null
        & 7z x "cef.tar"     -o"third_party" -y | Out-Null

        # Move extracted folder to the fixed name "third_party/cef"
        # NOTE: Rename-Item requires just the new *name*, not a path —
        #       so we use Move-Item with fully-qualified absolute paths instead.
        $extracted = Get-ChildItem "third_party" -Directory `
          | Where-Object { $_.Name -like "cef_binary_*" } `
          | Select-Object -First 1

        if ($extracted) {
          $dest = Join-Path (Resolve-Path "third_party").Path "cef"
          Move-Item -Path $extracted.FullName -Destination $dest -Force
          Write-Host "CEF ready at: $dest"
        } else {
          # Dump what is in third_party/ to aid debugging
          Write-Host "Contents of third_party/:"
          Get-ChildItem "third_party" | Select-Object Name | Format-Table
          throw "CEF extraction failed — no cef_binary_* folder found in third_party/"
        }

        Remove-Item "cef.tar.bz2","cef.tar" -Force -ErrorAction SilentlyContinue

    # ── 5. Install Qt 6 ───────────────────────────────────────────────────────
    - name: 🎨 Install Qt ${{ env.QT_VERSION }}
      uses: jurplel/install-qt-action@v4
      with:
        version:   ${{ env.QT_VERSION }}
        host:      windows
        target:    desktop
        arch:      win64_msvc2022_64
        modules:   ''           # add extra Qt modules here if needed
        cache:     true
        cache-key-prefix: qt-${{ env.QT_VERSION }}-msvc2022-64

    # ── 6. Download SQLite (amalgamation) ─────────────────────────────────────
    - name: 💾 Cache SQLite
      id: cache-sqlite
      uses: actions/cache@v4
      with:
        path: third_party/sqlite
        key: sqlite-3470200

    - name: ⬇️  Download SQLite amalgamation
      if: steps.cache-sqlite.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $ProgressPreference = 'SilentlyContinue'
        New-Item -ItemType Directory -Force -Path "third_party/sqlite" | Out-Null
        Invoke-WebRequest `
          -Uri "https://www.sqlite.org/2024/sqlite-amalgamation-3470200.zip" `
          -OutFile "sqlite.zip"
        Expand-Archive -Path "sqlite.zip" -DestinationPath "." -Force

        $dir = Get-ChildItem -Directory | `
          Where-Object { $_.Name -like "sqlite-amalgamation-*" } | `
          Select-Object -First 1
        if ($dir) {
          Copy-Item "$($dir.FullName)/sqlite3.c"  "third_party/sqlite/"
          Copy-Item "$($dir.FullName)/sqlite3.h"  "third_party/sqlite/"
          Remove-Item $dir.FullName -Recurse -Force
        }
        Remove-Item "sqlite.zip" -Force
        Write-Host "SQLite ready"

    # ── 7. Download nlohmann/json ─────────────────────────────────────────────
    - name: ⬇️  Download nlohmann/json
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "third_party/nlohmann_json" | Out-Null
        $ProgressPreference = 'SilentlyContinue'
        Invoke-WebRequest `
          -Uri "https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp" `
          -OutFile "third_party/nlohmann_json/json.hpp"
        Write-Host "nlohmann/json ready"

    # ── 8. Setup MSVC environment ──────────────────────────────────────────────
    - name: 🔧 Setup MSVC (x64)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    # ── 9. Configure CMake ────────────────────────────────────────────────────
    - name: ⚙️  Configure CMake
      shell: pwsh
      run: |
        cmake -B build `
          -G "Visual Studio 17 2022" `
          -A x64 `
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
          -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
          -DCEF_ROOT="${{ github.workspace }}/third_party/cef" `
          -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/dist"

    # ── 10. Build ─────────────────────────────────────────────────────────────
    - name: 🔨 Build ZAP Browser
      shell: pwsh
      run: |
        cmake --build build `
          --config ${{ env.BUILD_TYPE }} `
          --parallel $env:NUMBER_OF_PROCESSORS

    # ── 11. Collect artifacts ────────────────────────────────────────────────
    - name: 📦 Collect build artifacts
      shell: pwsh
      run: |
        $outDir = "dist/zap-browser"
        New-Item -ItemType Directory -Force -Path $outDir | Out-Null

        # Main executable + DLLs from bin/Release
        $binDir = "build/bin/Release"
        if (Test-Path $binDir) {
          Copy-Item "$binDir/*" $outDir -Recurse -Force
        } else {
          Write-Warning "Binary directory not found: $binDir"
          Get-ChildItem build -Recurse -Filter "*.exe" | ForEach-Object {
            Copy-Item $_.FullName $outDir -Force
          }
        }

        # Assets (themes, blocklists, etc.)
        if (Test-Path "assets") {
          Copy-Item "assets" "$outDir/assets" -Recurse -Force
        }

        # README
        Copy-Item "README.md" $outDir -Force -ErrorAction SilentlyContinue

        Write-Host "`nArtifact contents:"
        Get-ChildItem $outDir -Recurse | Select-Object FullName

    # ── 12. Upload artifact (every build) ────────────────────────────────────
    - name: ⬆️  Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}-${{ github.sha }}
        path: dist/zap-browser/
        retention-days: 14
        if-no-files-found: warn

    # ── 13. Create GitHub Release (on version tags only) ────────────────────
    - name: 🚀 Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        name: "⚡ ZAP Browser ${{ github.ref_name }}"
        body: |
          ## ⚡ ZAP Browser ${{ github.ref_name }}

          A lightweight, privacy-first browser.

          ### 📦 Installation (Windows)
          1. Download `zap-windows-x64.zip` below
          2. Extract anywhere
          3. Run `zap.exe`

          > **Note:** Install [Ollama](https://ollama.com) for AI features.
          > Tor is bundled — no separate install needed.

          ### What's new
          See [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for changes.
        files: |
          dist/zap-browser/**/*
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        generate_release_notes: true

# ── Lint / Static Analysis (optional parallel job) ────────────────────────────
  lint:
    name: 🔍 Static Analysis
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run cppcheck
      shell: pwsh
      run: |
        # Install cppcheck via winget or chocolatey if available
        $cppcheck = Get-Command "cppcheck" -ErrorAction SilentlyContinue
        if ($cppcheck) {
          cppcheck --enable=all --std=c++20 `
            --suppress=missingInclude `
            --suppress=missingIncludeSystem `
            --error-exitcode=1 `
            src/ 2>&1 | Tee-Object -FilePath cppcheck-report.txt
        } else {
          Write-Host "cppcheck not installed — skipping static analysis"
          Write-Host "To enable: add cppcheck to the runner or use a Docker image"
        }
      continue-on-error: true

    - name: Upload cppcheck report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cppcheck-report
        path: cppcheck-report.txt
        if-no-files-found: ignore
        retention-days: 7
